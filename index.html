<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#2563EB">
  <!-- Segurança: restringe de onde scripts/estilos/conexões/imagens podem vir -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://esm.sh; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: blob: https://*.supabase.co; connect-src 'self' https://esm.sh https://*.supabase.co wss://*.supabase.co; media-src 'self' blob:; worker-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; upgrade-insecure-requests">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <title>Flex Drive — App</title>
  <meta name="description" content="Aplicativo Flex Drive — painel da empresa e área do cliente.">
  <link rel="icon" href="assets/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <div id="app">
    <div class="loading-screen"><div class="spinner"></div></div>
  </div>
  <script type="module" src="js/app.js"></script>
  <script>
    /* Versionamento automático: service worker network-first mantém o app sempre atualizado. */
    if ('serviceWorker' in navigator) {
      const hadController = !!navigator.serviceWorker.controller;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        // quando um SW novo assume o controle (deploy novo), recarrega uma vez p/ pegar a versão atual
        if (!hadController || window.__swReloaded) return;
        window.__swReloaded = true;
        location.reload();
      });
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').then((reg) => {
          // procura atualização assim que abre e periodicamente
          reg.update();
          setInterval(() => reg.update(), 60 * 60 * 1000);
        }).catch(() => {});
      });
    }
  </script>
</body>
</html>
