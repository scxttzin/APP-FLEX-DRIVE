name: Publicar versão ofuscada (GitHub Pages)

# MANUAL de propósito: não roda sozinho e não altera o deploy atual.
# Para usar: aba Actions → "Publicar versão ofuscada" → Run workflow.
# Antes, mude em Settings → Pages → Source para "GitHub Actions".
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Instalar dependências de build
        run: npm install --no-audit --no-fund
      - name: Empacotar + ofuscar
        run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
